<!DOCTYPE html>
<html>
<head>
    <title>Java Script Example 01</title>
</head>
<body>
 
    <ul id="list1"></ul>
 
    <script>
       
        for (let i = 1; i <= 20; i++) {
     
            if (i === 5 || i === 10 || i === 15) {
                continue;
            }
            document.getElementById("list1").innerHTML += `<li>${i}</li>`;
        }
    </script>
 
</body>
</html>
