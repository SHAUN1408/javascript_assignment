<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Array Filter Assignment</title>
</head>
<body>
 
    <h3>Check the Browser Console to See the Filtered Array</h3>
 
    <script>
        // 1. Copy the provided array of people
        const people = [
            "Alice Anderson",
            "Aaron Adams",
            "Bella Brown",
            "Brian Black",
            "Cathy Carter",
            "Charles Cooper",
            "Diana Davis",
            "Daniel Drake",
            "Ella Evans",
            "Ethan Edwards",
            "Fiona Fisher",
            "Frank Foster",
            "Grace Green",
            "Gavin Gray",
            "Hannah Harris",
            "Henry Hill",
            "Isabella Ingram",
            "Ian Irving",
            "Jack Johnson",
            "Julia James"
        ];
 
        // 2. Choose the letter you want to filter by (e.g., "B")
        const targetLetter = "B";
 
        // 3. Use the filter() method to pick out names starting with that letter
        const result = people.filter((person) => {
            // Check if the first character (index 0) matches our target letter
            return person.charAt(0) === targetLetter;
        });
 
        // 4. Display the filtered array in the browser console
        console.log(`Names starting with "${targetLetter}":`, result);
    </script>
 
</body>
</html>
